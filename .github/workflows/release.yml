name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.2"
          arch: "win64_mingw"
          tools: "tools_mingw1310"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          windeployqt --release --compiler-runtime build\ClaudeUsageMonitor.exe

      - name: Package
        shell: pwsh
        run: |
          $paths = @(
            "build\ClaudeUsageMonitor.exe",
            "build\*.dll",
            "build\platforms",
            "build\styles",
            "build\imageformats",
            "build\iconengines"
          ) | Where-Object { Test-Path $_ }
          Compress-Archive -Path $paths -DestinationPath ClaudeUsageMonitor-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageMonitor-windows-x64
          path: ClaudeUsageMonitor-windows-x64.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeUsageMonitor-windows-x64.zip

  linux:
    name: Linux x64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build qt6-base-dev libcurl4-openssl-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          cp build/ClaudeUsageMonitor AppDir/usr/bin/
          cp packaging/linux/ClaudeUsageMonitor.desktop AppDir/usr/share/applications/
          cp packaging/linux/ClaudeUsageMonitor.svg AppDir/usr/share/icons/hicolor/scalable/apps/
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          export QMAKE=/usr/lib/qt6/bin/qmake
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/ClaudeUsageMonitor \
            --desktop-file AppDir/usr/share/applications/ClaudeUsageMonitor.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/ClaudeUsageMonitor.svg \
            --plugin qt \
            --output appimage
          mv ./*-x86_64.AppImage ClaudeUsageMonitor-linux-x64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageMonitor-linux-x64
          path: ClaudeUsageMonitor-linux-x64.AppImage

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeUsageMonitor-linux-x64.AppImage
